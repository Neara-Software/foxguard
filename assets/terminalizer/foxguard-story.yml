---
config:
  command: zsh
  cwd: "~/coding/tools/foxguard/assets/terminalizer"
  env:
    recording: 'true'
  cols: 110
  rows: 22
  frameDelay: auto
  maxIdleTime: 180
  quality: 55
  repeat: 0
  cursorStyle: block
  fontFamily: Menlo, Monaco, monospace
  fontSize: 14
  lineHeight: 1.2
  letterSpacing: 0
  theme:
    background: "#0b1020"
    foreground: "#e5e7eb"
    cursor: "#f59e0b"
    black: "#111827"
    red: "#f87171"
    green: "#34d399"
    yellow: "#fbbf24"
    blue: "#60a5fa"
    magenta: "#a78bfa"
    cyan: "#22d3ee"
    white: "#e5e7eb"
    brightBlack: "#6b7280"
    brightRed: "#fca5a5"
    brightGreen: "#6ee7b7"
    brightYellow: "#fcd34d"
    brightBlue: "#93c5fd"
    brightMagenta: "#c4b5fd"
    brightCyan: "#67e8f9"
    brightWhite: "#f9fafb"
  watermark:
    imagePath:
  frameBox:
    type: solid
    title:
    style:
      boxShadow: none
      margin: 0px
records:
- delay: 1
  content: "\e[3J\e[H\e[2J"
- delay: 120
  content: "# foxguard dark demo\r\n"
- delay: 80
  content: "# code scan, secrets, baseline\r\n"
- delay: 40
  content: "\r\n"
- delay: 80
  content: "$ "
- delay: 90
  content: 'ls -1 '
- delay: 90
  content: story-target
- delay: 40
  content: "\r\n"
- delay: 140
  content: "routes.js\r\nsecrets.env\r\nservices.js\r\n"
- delay: 700
  content: ''
- delay: 800
  content: "\e[3J\e[H\e[2J"
- delay: 120
  content: "# explain traces source -> sink\r\n"
- delay: 80
  content: "$ "
- delay: 90
  content: 'fg story-target '
- delay: 90
  content: "--explain || true"
- delay: 40
  content: "\r\n"
- delay: 170
  content: "    █   js/express-no-hardcoded-session-secret (CWE-798)  line 7:25\r\n\r\n
    \   █ source → story-target/routes.js:11  req.query\r\n\r\n    █  CRITICAL  exec()
    called with dynamic argument — risk of command injection\r\n    █   js/no-command-injection
    (CWE-78)  line 18:3\r\n"
- delay: 190
  content: "    █ source → story-target/routes.js:17  req.query\r\n\r\n\r\n  story-target/services.js
    · 1 issue\r\n\r\n\r\n$ fg secrets story-target || true\r\n"
- delay: 900
  content: ''
- delay: 900
  content: "\e[3J\e[H\e[2J"
- delay: 120
  content: "# secrets are redacted\r\n"
- delay: 80
  content: "$ "
- delay: 90
  content: 'fg secrets '
- delay: 90
  content: story-target || true
- delay: 40
  content: "\r\n"
- delay: 170
  content: "    █   secret/aws-access-key-id (CWE-798)  line 1:19\r\n\r\n\r\n    █
    \  secret/aws-secret-access-key (CWE-798)  line 2:1\r\n\r\n\r\n    █   secret/github-token
    (CWE-798)  line 3:14\r\n"
- delay: 190
  content: "\r\n    █   secret/stripe-live-key (CWE-798)  line 4:19\r\n\r\n\r\n  ──────────────────────────────────────────────────\r\n\r\n\r\n$
    fg baseline story-target --output .demo-baseline.json\r\n"
- delay: 900
  content: ''
- delay: 900
  content: "\e[3J\e[H\e[2J"
- delay: 120
  content: "# baseline existing findings\r\n"
- delay: 80
  content: "$ "
- delay: 90
  content: 'fg baseline story-target '
- delay: 90
  content: "--output .demo-baseline.json"
- delay: 40
  content: "\r\n"
- delay: 170
  content: "\r  foxguard v0.6.3 · scanning... \r                                                            \r\r\n"
- delay: 700
  content: ''
- delay: 900
  content: "\e[3J\e[H\e[2J"
- delay: 120
  content: "# next run stays clean\r\n"
- delay: 80
  content: "$ "
- delay: 90
  content: 'fg story-target '
- delay: 90
  content: "--baseline .demo-baseline.json"
- delay: 40
  content: "\r\n"
- delay: 180
  content: "\r\n"
- delay: 1000
  content: ''
