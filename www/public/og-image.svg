  <text x="116" y="334" fill="#A8A29E" font-family="Arial, Helvetica, sans-serif" font-size="24">174 built-in rules. 10 languages. Cross-file taint tracking.</text>
  <text x="116" y="366" fill="#78716C" font-family="Arial, Helvetica, sans-serif" font-size="22">Single Rust binary. Sub-second local scans.</text>

