name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - run: cargo test

  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - run: cargo build --release

  dogfood:
    name: Dogfood (foxguard scans itself)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Build foxguard
        run: cargo build --release

      - name: Scan own source (must be clean)
        run: ./target/release/foxguard src/

      - name: Scan own source for secrets (must be clean)
        run: ./target/release/foxguard secrets src/

      - name: Verify fixture detection (must find issues)
        run: |
          if ./target/release/foxguard tests/fixtures/ 2>&1; then
            echo "::error::Expected foxguard to find issues in test fixtures but it exited clean"
            exit 1
          else
            echo "Fixtures correctly detected — foxguard found issues as expected"
          fi

      - name: Generate and commit badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cat > assets/badge.svg << 'BADGE'
          <svg xmlns="http://www.w3.org/2000/svg" width="132" height="28" viewBox="0 0 132 28">
            <rect width="84" height="28" rx="6" fill="#1C1917"/>
            <rect x="82" width="50" height="28" rx="6" fill="#065F46"/>
            <rect x="82" width="4" height="28" fill="#065F46"/>
            <rect width="132" height="28" rx="6" fill="none" stroke="#292524" stroke-width="1"/>
            <svg x="6" y="4" width="20" height="20" viewBox="0 0 64 64" fill="none">
              <path d="M8 8L20 28L32 20L44 28L56 8L52 32L44 44L36 52H28L20 44L12 32L8 8Z" fill="#F59E0B" fill-opacity="0.25" stroke="#F59E0B" stroke-width="3" stroke-linejoin="round"/>
              <circle cx="24" cy="32" r="2.5" fill="#F59E0B"/>
              <circle cx="40" cy="32" r="2.5" fill="#F59E0B"/>
            </svg>
            <text x="30" y="18.5" fill="#D6D3D1" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">foxguard</text>
            <text x="96" y="18.5" fill="#A7F3D0" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">clean</text>
          </svg>
          BADGE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/badge.svg
          git diff --cached --quiet && echo "Badge unchanged" || git commit -m "Update badge [skip ci]" && git push
